<!DOCTYPE html>
<html>
<head>
    <title>PARLIAMENT</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; display: flex; padding: 20px; gap: 20px; color: #333; margin: 0; }
        .sidebar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 480px; height: fit-content; max-height: 95vh; overflow-y: auto; }
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .party-input { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; cursor: grab; }
        .row-top { display: flex; gap: 6px; align-items: center; }
        .gov-check { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: bold; color: #007bff; white-space: nowrap; }
        label { display: block; font-size: 10px; font-weight: bold; color: #777; text-transform: uppercase; margin-bottom: 4px; }
        input[type="text"], textarea { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        input[type="number"] { width: 60px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; }
        
        .calculator-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .calc-header { background: #e9ecef; padding: 10px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: bold; color: #495057; text-transform: uppercase; }
        .calc-header:hover { background: #dee2e6; }
        .calc-content { padding: 12px; display: block; }
        .calc-content.collapsed { display: none; }

        .calc-results { margin-top: 10px; font-size: 12px; background: white; border: 1px solid #eee; padding: 8px; border-radius: 4px; display: none; white-space: pre-wrap; }
        .mode-toggle { display: flex; background: #ddd; border-radius: 20px; padding: 4px; margin-bottom: 15px; }
        .mode-btn { flex: 1; border: none; background: none; padding: 6px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .mode-btn.active { background: #007bff; color: white; }
        .toggle-switch { display: flex; align-items: center; justify-content: space-between; background: #f0f2f5; padding: 8px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .toggle-switch span { font-size: 11px; font-weight: bold; color: #555; }
        .v-btn { flex: 1; border: 1px solid #ddd; padding: 4px; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; background: white; color: #666; transition: 0.2s; }
        .v-btn.active-yes { background: #4caf50; color: white; border-color: #388e3c; }
        .v-btn.active-no { background: #f44336; color: white; border-color: #d32f2f; }
        .v-btn.active-abs { background: #d3d3d3; color: #333; border-color: #bbb; }
        .v-btn.active-dnv { background: #ffffff; color: #333; border-color: #000; box-shadow: inset 0 0 0 1px #000; }
        .vote-only { display: none; }
        body.voting-mode .vote-only { display: block; }
        body.voting-mode .chamber-only { display: none; }
        svg { background: white; border-radius: 15px; width: 100%; max-width: 800px; height: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .copy-box { background: #222; color: #adbac7; padding: 15px; border-radius: 8px; width: 100%; max-width: 800px; margin-top: 15px; position: relative; }
        #copyText { white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 12px; }
        .actions { display: flex; gap: 10px; position: absolute; top: 10px; right: 10px; }
        .action-btn { background: #444; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .img-btn { background: #007bff; }
        .info-bar { display: flex; gap: 20px; margin-bottom: 10px; font-weight: bold; color: #555; }
        .data-tools { display: flex; gap: 5px; margin-top: 10px; }
        .data-btn { flex: 1; font-size: 10px; padding: 5px; cursor: pointer; border: 1px solid #ccc; background: #f9f9f9; border-radius: 4px; }
        .acronym-input { width: 45px !important; text-align: center; font-weight: bold; }
        .coalition-input { font-size: 11px !important; color: #555; font-style: italic; }
    </style>
</head>
<body class="chamber-mode">

<div class="sidebar">
    <div class="mode-toggle">
        <button class="mode-btn active" id="btn-chamber" onclick="setMode('chamber')">CHAMBER MODE</button>
        <button class="mode-btn" id="btn-voting" onclick="setMode('voting')">VOTING MODE</button>
    </div>

    <div class="toggle-switch">
        <span>BENCH AUTO-SORT</span>
        <input type="checkbox" id="toggleSort" checked onchange="draw()">
    </div>

    <div class="calculator-box">
        <div class="calc-header" onclick="toggleCalculator()">
            <span>Calculators & Majority Builder</span>
            <span id="calc-arrow">▲</span>
        </div>
        <div id="calc-body" class="calc-content">
            <label>Seat Calculator</label>
            <textarea id="calcInput" placeholder="SNP: 12972347&#10;Plaid: 2397" style="height: 60px; font-family: monospace; font-size: 11px;"></textarea>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                <label style="margin:0;">Target:</label>
                <input type="number" id="calcTarget" value="650" style="width: 80px;">
                <button style="flex-grow:1; font-size: 11px; padding: 5px; cursor: pointer;" onclick="calculateSeats()">Calculate</button>
            </div>
            <div id="calcResults" class="calc-results"></div>
            
            <div style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
                <label>Majority Builder</label>
                <div id="coalition-list" style="max-height: 150px; overflow-y: auto; background: white; border: 1px solid #eee; padding: 5px; border-radius: 4px; font-size: 11px; margin-bottom: 5px;"></div>
                <div id="coalition-summary" style="font-size: 12px; font-weight: bold; padding: 5px; background: #fff; border: 1px solid #eee; border-radius: 4px;">
                    Selected: 0 / Maj: 0
                </div>
            </div>

            <button id="applyCalcBtn" style="display:none; width: 100%; margin-top:5px; background:#28a745; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;" onclick="applyCalculatedSeats()">Apply to Diagram</button>
        </div>
    </div>
    <div class="control-group voting-only" style="display:none;" id="bill-meta">
        <label>Bill Details</label>
        <input type="text" id="actName" placeholder="ACT NAME" oninput="draw()" value="ACT NAME">
        <textarea id="actDesc" placeholder="Description..." oninput="draw()" style="margin-top:5px; height:50px;">Description here...</textarea>
    </div>

    <div class="control-group chamber-only">
        <label>Officers</label>
        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
            <div style="flex:1; min-width: 100px;"><label style="font-size:9px;">Prime Minister</label><input type="text" id="pmName" oninput="draw()" value="Fenn"></div>
            <div style="flex:1; min-width: 100px;"><label style="font-size:9px;">Speaker</label><input type="text" id="speakerName" oninput="draw()" value="Clyde"></div>
			<div style="flex:1; min-width: 100px;"><label style="font-size:9px;">Leader of the Opposition</label><input type="text" id="lOpposition" oninput="draw()" value="Rusty"></div>
        </div>
    </div>

    <div id="party-list"></div>
    <button style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; margin-top:10px;" onclick="addParty()">+ Add Party</button>
    
    <div class="data-tools">
        <button class="data-btn" onclick="exportData()">📤 Export JSON</button>
        <button class="data-btn" onclick="document.getElementById('importFile').click()">📥 Import JSON</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
    </div>
</div>

<div class="main">
    <div class="info-bar">
        <h2 id="counter" style="margin:0;">Total Seats: 0</h2>
        <h2 id="majority-counter" style="margin:0; color:#d63384;">Majority: 0</h2>
    </div>
    <svg id="parliament" viewBox="-130 -130 260 145" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="copy-box">
        <div class="actions">
            <button class="action-btn img-btn" onclick="copyImage()">Copy Image</button>
            <button class="action-btn" onclick="copyReport()">Copy Text</button>
        </div>
        <div id="copyText"></div>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let currentMode = 'chamber';
    let calculatedData = [];

    function toggleCalculator() {
        const body = document.getElementById('calc-body');
        const arrow = document.getElementById('calc-arrow');
        body.classList.toggle('collapsed');
        arrow.innerText = body.classList.contains('collapsed') ? '▼' : '▲';
    }

    function updateMajorityBuilder() {
        const container = document.getElementById('coalition-list');
        const summary = document.getElementById('coalition-summary');
        const partyDivs = document.querySelectorAll('.party-input');
        
        const checkedStates = {};
        container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            checkedStates[cb.dataset.key] = cb.checked;
        });

        container.innerHTML = '';
        let currentCombined = 0;
        let totalSeatsInHouse = 0;

        partyDivs.forEach((p, idx) => {
            const name = p.querySelector('.name').value || "Unnamed";
            const seats = parseInt(p.querySelector('.seats').value) || 0;
            const acr = p.querySelector('.acronym').value;
            const key = `party-${idx}`;

            totalSeatsInHouse += seats;

            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.alignItems = 'center';
            row.style.gap = '5px';
            row.style.marginBottom = '3px';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.dataset.key = key;
            cb.checked = !!checkedStates[key];
            cb.onchange = updateMajorityBuilder;
            
            if (cb.checked) currentCombined += seats;

            const span = document.createElement('span');
            span.innerText = `[${acr}] ${name} (${seats})`;
            span.style.cursor = 'pointer';
            span.onclick = () => { cb.checked = !cb.checked; updateMajorityBuilder(); };

            row.appendChild(cb);
            row.appendChild(span);
            container.appendChild(row);
        });

        const maj = Math.floor(totalSeatsInHouse / 2) + 1;
        const diff = currentCombined - maj;
        const status = currentCombined >= maj ? 
            `<span style="color:#28a745">PASSED (+${diff})</span>` : 
            `<span style="color:#dc3545">FAILED (${diff})</span>`;
        
        summary.innerHTML = `Selected: ${currentCombined} / Maj: ${maj}<br>Status: ${status}`;
    }

    function calculateSeats() {
        const input = document.getElementById('calcInput').value;
        const targetTotal = parseInt(document.getElementById('calcTarget').value) || 0;
        const lines = input.split('\n');
        let rawParties = [], totalRaw = 0;
        lines.forEach(line => {
            const parts = line.split(/[:\s]+/);
            const num = parseInt(parts.pop());
            const name = parts.join(' ').trim();
            if (name && !isNaN(num)) { rawParties.push({ name, num }); totalRaw += num; }
        });
        if (totalRaw === 0) return;
        calculatedData = rawParties.map(p => ({
            name: p.name, 
            seats: Math.round((p.num / totalRaw) * targetTotal),
            acronym: p.name.substring(0, 3).toUpperCase()
        }));
        const resDiv = document.getElementById('calcResults');
        resDiv.style.display = 'block';
        resDiv.innerText = "Results:\n" + calculatedData.map(p => `${p.name}: ${p.seats}`).join('\n');
        document.getElementById('applyCalcBtn').style.display = 'block';
    }

    function applyCalculatedSeats() {
        document.getElementById('party-list').innerHTML = '';
        calculatedData.forEach(p => addParty(p.name, p.seats, '#2c3e50', false, p.acronym));
        draw();
    }

    function adjustColor(hex, index) {
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        let shift = ((index % 4) - 2) * 15;
        const cl = (n) => Math.min(255, Math.max(0, n + shift));
        return `rgb(${cl(r)}, ${cl(g)}, ${cl(b)})`;
    }

    function setMode(m) {
        currentMode = m;
        document.body.className = m + '-mode';
        document.getElementById('btn-chamber').classList.toggle('active', m === 'chamber');
        document.getElementById('btn-voting').classList.toggle('active', m === 'voting');
        document.getElementById('bill-meta').style.display = (m === 'voting' ? 'block' : 'none');
        draw();
    }

    function addParty(name="Party", seats=50, color="#2c3e50", isGov=false, acronym="", vote='Idle', ovY=0, ovN=0, ovA=0, ovD=0, ovActive=false, coalition="") {
        const div = document.createElement('div');
        div.className = 'party-input';
        div.draggable = true;
        div.dataset.vote = vote;
        div.innerHTML = `
            <div class="row-top">
                <span style="cursor:grab; color:#ccc;">≡</span>
                <input type="color" value="${color}" oninput="draw()">
                <input type="text" class="acronym acronym-input" placeholder="Acr" value="${acronym}" oninput="draw()">
                <input type="text" class="name" value="${name}" oninput="draw()">
                <input type="number" class="seats" value="${seats}" oninput="draw()">
                <label class="gov-check"><input type="checkbox" class="is-gov" ${isGov?'checked':''} onchange="draw()"> GOV</label>
                <button style="border:none; background:none; color:red; cursor:pointer;" onclick="this.closest('.party-input').remove(); draw()">×</button>
            </div>
            <div class="chamber-only" style="margin-top:2px;">
                <input type="text" class="coalition coalition-input" placeholder="Enter Coalition Name..." value="${coalition}" oninput="draw()">
            </div>
            <div class="vote-only" style="margin-top:5px; border-top:1px solid #eee; padding-top:5px;">
                <div style="display:flex; gap:5px; align-items:center;">
                    <div style="display:flex; gap:2px; flex-grow:1;">
                        <button class="v-btn v-yes ${vote==='Yes'?'active-yes':''}" onclick="setVote(this, 'Yes')">YES</button>
                        <button class="v-btn v-no ${vote==='No'?'active-no':''}" onclick="setVote(this, 'No')">NO</button>
                        <button class="v-btn v-abs ${vote==='Abstain'?'active-abs':''}" onclick="setVote(this, 'Abstain')">ABS</button>
                        <button class="v-btn v-dnv ${vote==='DNV'?'active-dnv':''}" onclick="setVote(this, 'DNV')">DNV</button>
                    </div>
                    <button class="v-btn" style="flex:0; padding:4px 8px; ${ovActive?'background:#007bff; color:white;':''}" onclick="toggleOverride(this)">⚡</button>
                    <div class="override-panel" style="display:${ovActive?'flex':'none'}; gap:5px;">
                        <input type="number" class="ov-yes" value="${ovY}" placeholder="Y" oninput="draw()" style="width:28px; font-size:10px;">
                        <input type="number" class="ov-no" value="${ovN}" placeholder="N" oninput="draw()" style="width:28px; font-size:10px;">
                        <input type="number" class="ov-abs" value="${ovA}" placeholder="A" oninput="draw()" style="width:28px; font-size:10px;">
                        <input type="number" class="ov-dnv" value="${ovD}" placeholder="D" oninput="draw()" style="width:28px; font-size:10px;">
                    </div>
                </div>
            </div>
        `;

        div.ondragstart = (e) => { window.draggedItem = div; };
        div.ondragover = (e) => e.preventDefault();
        div.ondrop = (e) => {
            const list = document.getElementById('party-list');
            const target = e.target.closest('.party-input');
            if (target && window.draggedItem !== target) { list.insertBefore(window.draggedItem, target); draw(); }
        };

        document.getElementById('party-list').appendChild(div);
        draw();
    }

    function setVote(btn, type) {
        const pDiv = btn.closest('.party-input');
        pDiv.dataset.vote = (pDiv.dataset.vote === type) ? 'Idle' : type;
        pDiv.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active-yes', 'active-no', 'active-abs', 'active-dnv'));
        if(pDiv.dataset.vote !== 'Idle') btn.classList.add(`active-${type.toLowerCase()}`);
        draw();
    }

    function toggleOverride(btn) {
        const panel = btn.nextElementSibling;
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        btn.style.background = (panel.style.display === 'flex') ? '#007bff' : 'white';
        btn.style.color = (panel.style.display === 'flex') ? 'white' : '#666';
        draw();
    }

    function draw() {
        const svg = document.getElementById('parliament');
        const doAutoSort = document.getElementById('toggleSort').checked;
        svg.innerHTML = '';
        svg.style.fontFamily = 'Arial, sans-serif';

        let seatData = [], partyLabels = [], totalSeats = 0, speakerCount = 0;
        let rep = { yesP: [], noP: [], absP: [], dnvP: [], tallies: {y:0, n:0, a:0, d:0}, govT: 0, oppT: 0 };
        let coalitions = {};
        let govBench = [], oppBench = [], speakerSeat = null;
        
        // Storage for textual reports in chronological (input) order
        let govOutput = [];
        let oppOutput = [];
        let nonGovParties = [];

        document.querySelectorAll('.party-input').forEach((p, idx) => {
            const seats = parseInt(p.querySelector('.seats').value) || 0;
            const name = p.querySelector('.name').value || "Unnamed";
            const acr = p.querySelector('.acronym').value;
            const col = p.querySelector('input[type="color"]').value;
            const isGov = p.querySelector('.is-gov').checked;
            const coal = p.querySelector('.coalition-input').value.trim();
            const partyLabel = `[${acr}] ${name} (${seats})`;
            
            if(acr === "SPK" || name === "Speaker") {
                speakerSeat = { color: col, name: name, acr: acr, seats: seats };
                totalSeats += seats;
                speakerCount += seats;
                if (currentMode === 'voting') {
                    rep.tallies.a += seats;
                    rep.absP.push(`[${acr}] ${name} (${seats})`);
                }
                return; 
            }

            totalSeats += seats;
            partyLabels.push({ count: seats, acr: acr, color: col, isGov: isGov });
            
            const partyObj = { seats, name, acr, col, isGov, coal, idx, partyLabel, p };
            if(isGov) {
                govOutput.push(`${seats} - ${name}`);
                rep.govT += seats;
            } else {
                nonGovParties.push(partyObj);
                rep.oppT += seats;
            }

            if (coal) {
                if (!coalitions[coal]) coalitions[coal] = { total: 0, members: [] };
                coalitions[coal].total += seats;
                coalitions[coal].members.push(`${name} (${seats})`);
            }

            // DOT GENERATION
            let tempPartySeats = [];
            const isOver = p.querySelector('.override-panel').style.display === 'flex';
            if (currentMode === 'voting') {
                if (isOver) {
                    const y = parseInt(p.querySelector('.ov-yes').value) || 0, n = parseInt(p.querySelector('.ov-no').value) || 0;
                    const a = parseInt(p.querySelector('.ov-abs').value) || 0, d = parseInt(p.querySelector('.ov-dnv').value) || 0;
                    const idle = Math.max(0, seats - (y+n+a+d));
                    if(y > 0) rep.yesP.push(`[${acr}] ${name} (${y})`);
                    if(n > 0) rep.noP.push(`[${acr}] ${name} (${n})`);
                    if(a > 0) rep.absP.push(`[${acr}] ${name} (${a})`);
                    if(d+idle > 0) rep.dnvP.push(`[${acr}] ${name} (${d+idle})`);
                    rep.tallies.y += y; rep.tallies.n += n; rep.tallies.a += a; rep.tallies.d += (d + idle);
                    for(let j=0; j<y; j++) tempPartySeats.push({ color: '#4caf50', acr });
                    for(let j=0; j<n; j++) tempPartySeats.push({ color: '#f44336', acr });
                    for(let j=0; j<a; j++) tempPartySeats.push({ color: '#d3d3d3', acr });
                    for(let j=0; j<(d+idle); j++) tempPartySeats.push({ color: '#ffffff', dnv: true, acr });
                } else {
                    const v = p.dataset.vote;
                    let c = col, isD = false;
                    if(v==='Yes') { c='#4caf50'; rep.tallies.y += seats; rep.yesP.push(partyLabel); }
                    else if(v==='No') { c='#f44336'; rep.tallies.n += seats; rep.noP.push(partyLabel); }
                    else if(v==='Abstain') { c='#d3d3d3'; rep.tallies.a += seats; rep.absP.push(partyLabel); }
                    else { c='#ffffff'; isD = true; rep.tallies.d += seats; rep.dnvP.push(partyLabel); }
                    for(let j=0; j<seats; j++) tempPartySeats.push({ color: isD ? c : adjustColor(c, idx), dnv: isD, acr });
                }
            } else {
                for(let j=0; j<seats; j++) tempPartySeats.push({ color: adjustColor(col, idx), acr });
            }

            if (doAutoSort) {
                if(isGov) govBench.push(...tempPartySeats); 
                else oppBench.push(...tempPartySeats);
            } else {
                seatData.push(...tempPartySeats);
            }
        });

        if (doAutoSort) {
            seatData = [...govBench, ...oppBench];
            partyLabels.sort((a,b) => (b.isGov - a.isGov));
        }

        // Logic for "Official Opposition" (Largest non-gov party)
        let officialOpp = null;
        let otherOppOutput = [];
        let officialOppSeats = 0;

        if (nonGovParties.length > 0) {
            // Finding the largest by magnitude for the title, but preserving input order for the list
            let sortedBySeats = [...nonGovParties].sort((a,b) => b.seats - a.seats);
            officialOpp = sortedBySeats[0];
            officialOppSeats = officialOpp.seats;
            
            nonGovParties.forEach(p => {
                if (p === officialOpp) return;
                otherOppOutput.push(`${p.seats} - ${p.name}`);
            });
        }

        const effectiveHouse = totalSeats - rep.tallies.a;
        const majority = Math.floor(effectiveHouse / 2) + 1;
        const chamberSeats = totalSeats - speakerCount;

        document.getElementById('counter').innerText = `Total Seats: ${totalSeats}`;
        document.getElementById('majority-counter').innerText = `Majority: ${majority}`;
        
        if (currentMode === 'chamber') {
            let chamberMsg = `Prime Minister: ${document.getElementById('pmName').value}\n` +
                             `Speaker: ${document.getElementById('speakerName').value}\n` +
                             `Leader of the Opposition: ${document.getElementById('lOpposition').value}\n\n`;
            
            chamberMsg += `Government (${rep.govT}):\n${govOutput.join('\n')}\n\n`;
            
            if (officialOpp) {
                chamberMsg += `Official Opposition (${officialOppSeats}):\n${officialOpp.seats} - ${officialOpp.name}\n\n`;
            }

            const otherOppT = rep.oppT - officialOppSeats;
            if (otherOppOutput.length > 0) {
                chamberMsg += `Opposition (${otherOppT}):\n${otherOppOutput.join('\n')}\n\n`;
            }

            if (Object.keys(coalitions).length > 0) {
                chamberMsg += `COALITIONS & BLOCS:\n`;
                for (const [cName, data] of Object.entries(coalitions)) {
                    const hasMaj = data.total >= (Math.floor(totalSeats/2)+1) ? "✅ (Majority)" : "❌ (Minority)";
                    chamberMsg += `${cName.toUpperCase()} (${data.total} seats) ${hasMaj}:\n - ${data.members.join('\n - ')}\n`;
                }
            }
            document.getElementById('copyText').innerText = chamberMsg;
		} else {
			const status = rep.tallies.y >= majority ? "@PASSED" : "@FAILED";
			let voteMsg = `# ${document.getElementById('actName').value.toUpperCase()}\n${status} (Majority: ${majority} of ${effectiveHouse})\n${document.getElementById('actDesc').value}\n\n`;
            voteMsg += `✅ YES (${rep.tallies.y}):\n${(rep.yesP.join(', ') || 'None')}\n\n`;
            voteMsg += `❌ NO (${rep.tallies.n}):\n${(rep.noP.join(', ') || 'None')}\n\n`;
            voteMsg += `😅 ABSTAIN (${rep.tallies.a}):\n${(rep.absP.join(', ') || 'None')}\n\n`;
            voteMsg += `💤 DNV (${rep.tallies.d}):\n${(rep.dnvP.join(', ') || 'None')}`;
			document.getElementById('copyText').innerText = voteMsg;
		}

        const innerR = 45, maxR = 100, rowCount = Math.max(1, Math.round(Math.sqrt(chamberSeats / 2.2)));
        const rowSpacing = rowCount > 1 ? (maxR - innerR) / (rowCount - 1) : 0;
        let positions = [], assigned = 0, tw = 0;
        for (let i = 0; i < rowCount; i++) tw += (innerR + (i * rowSpacing));
        for (let i = 0; i < rowCount; i++) {
            const r = innerR + (i * rowSpacing);
            let rowCap = (i === rowCount - 1) ? (chamberSeats - assigned) : Math.round((r / tw) * chamberSeats);
            assigned += rowCap;
            for (let j = 0; j < rowCap; j++) {
                const a = Math.PI + (rowCap > 1 ? (j / (rowCap - 1)) : 0.5) * Math.PI;
                positions.push({ x: r * Math.cos(a), y: r * Math.sin(a), a, r: (rowSpacing||10)*0.4 });
            }
        }
        positions.sort((a, b) => a.a - b.a);

        positions.forEach((pos, i) => {
            if (!seatData[i]) return;
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", pos.x); c.setAttribute("cy", pos.y); c.setAttribute("r", pos.r);
            c.setAttribute("fill", seatData[i].color);
            if(seatData[i].dnv) { c.setAttribute("stroke", "#000"); c.setAttribute("stroke-width", "0.2"); }
            svg.appendChild(c);
        });

        let labelIdx = 0, lastAngle = -100;
        partyLabels.forEach(label => {
            if (!label.acr || label.count === 0) { labelIdx += label.count; return; }
            const mid = labelIdx + (label.count / 2);
            const pos = positions[Math.floor(mid)];
            if (pos && (pos.a - lastAngle > 0.08)) {
                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", 115 * Math.cos(pos.a)); t.setAttribute("y", 115 * Math.sin(pos.a));
                t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", "5.5");
                t.setAttribute("fill", label.color); t.setAttribute("font-weight", "bold");
                t.textContent = label.acr;
                svg.appendChild(t);
                lastAngle = pos.a;
            }
            labelIdx += label.count;
        });

        if (speakerSeat) {
            const s = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            s.setAttribute("cx", "0"); s.setAttribute("cy", "0"); s.setAttribute("r", (positions[0]||{r:3}).r); 
            s.setAttribute("fill", currentMode==='voting'?'#d3d3d3':speakerSeat.color);
            s.setAttribute("stroke", "#333"); s.setAttribute("stroke-width", "0.5");
            svg.appendChild(s);
        }

        const meta = document.createElementNS("http://www.w3.org/2000/svg", "text");
        meta.setAttribute("x", "0"); meta.setAttribute("y", "-20"); meta.setAttribute("text-anchor", "middle");
        meta.setAttribute("font-size", "5"); meta.setAttribute("fill", "#666");
        meta.innerHTML = `<tspan x="0" dy="0">Total Seats: ${totalSeats}</tspan><tspan x="0" dy="6">Majority: ${majority}</tspan>`;
        svg.appendChild(meta);

        updateMajorityBuilder();
    }

    function exportData() {
        const parties = [];
        document.querySelectorAll('.party-input').forEach(p => {
            parties.push({
                name: p.querySelector('.name').value, acronym: p.querySelector('.acronym').value,
                seats: p.querySelector('.seats').value, color: p.querySelector('input[type="color"]').value,
                isGov: p.querySelector('.is-gov').checked, vote: p.dataset.vote,
                ovY: p.querySelector('.ov-yes').value, ovN: p.querySelector('.ov-no').value,
                ovA: p.querySelector('.ov-abs').value, ovD: p.querySelector('.ov-dnv').value,
                ovActive: p.querySelector('.override-panel').style.display === 'flex',
                coalition: p.querySelector('.coalition-input').value
            });
        });
        const blob = new Blob([JSON.stringify({ pmName: document.getElementById('pmName').value, speakerName: document.getElementById('speakerName').value, lOpposition: document.getElementById('lOpposition').value, parties })], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `parliament.json`; a.click();
    }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            document.getElementById('party-list').innerHTML = '';
            document.getElementById('pmName').value = data.pmName || "";
            document.getElementById('speakerName').value = data.speakerName || "";
            document.getElementById('lOpposition').value = data.lOpposition || "";
            data.parties.forEach(p => addParty(p.name, p.seats, p.color, p.isGov, p.acronym, p.vote, p.ovY, p.ovN, p.ovA, p.ovD, p.ovActive, p.coalition));
        };
        reader.readAsText(input.files[0]);
    }

    async function copyImage() {
        const svg = document.getElementById('parliament');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const svgClone = svg.cloneNode(true);
        svgClone.setAttribute("style", "font-family: Arial, sans-serif; background: white;");
        const svgData = new XMLSerializer().serializeToString(svgClone);
        const img = new Image();
        img.onload = () => {
            canvas.width = 2400; canvas.height = 1400; 
            ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 2400, 1400);
            ctx.drawImage(img, 0, 0, 2400, 1400);
            canvas.toBlob(b => navigator.clipboard.write([new ClipboardItem({[b.type]: b})]).then(() => alert("Copied!")));
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData.replace('>', '><style>text { font-family: Arial, sans-serif; }</style>'))));
    }

    function copyReport() { navigator.clipboard.writeText(document.getElementById('copyText').innerText); alert("Text Copied!"); }
